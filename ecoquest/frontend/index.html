<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoQuest - Pahlawan Bumi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            eco: {
              dark: '#1B4332',
              light: '#52B788',
              yellow: '#FFD166',
              brown: '#8B5E3C',
              cream: '#F8F4E9',
              red: '#E63946'
            }
          },
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F8F4E9;
      color: #1B4332;
    }
    /* Custom scrollbar for journal */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #F8F4E9; 
    }
    ::-webkit-scrollbar-thumb {
      background: #8B5E3C; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #1B4332; 
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
